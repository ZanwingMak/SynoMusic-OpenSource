name: Nocturne
options:
  bundleIdPrefix: app.nocturne
  deploymentTarget:
    iOS: "17.0"
  developmentLanguage: zh-Hans
  xcodeVersion: "26.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "6.0"
    ENABLE_USER_SCRIPT_SANDBOXING: NO
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"

targets:
  Nocturne:
    type: application
    platform: iOS
    sources:
      - path: Nocturne
        excludes:
          - "**/.DS_Store"
          - "NocturneLive/**"
    resources:
      - Nocturne/Resources/Assets.xcassets
    dependencies:
      - target: NocturneLive
        embed: true
    info:
      path: Nocturne/Resources/Info.plist
      properties:
        CFBundleDisplayName: Nocturne
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        UILaunchScreen:
          UIColorName: BrandBackground
        UIBackgroundModes:
          - audio
        NSSupportsLiveActivities: true
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: true
          NSAllowsLocalNetworking: true
        NSLocalNetworkUsageDescription: Nocturne 需要访问局域网以连接你的群晖 NAS 上的 Audio Station。
        NSBonjourServices:
          - _http._tcp
          - _https._tcp
        ITSAppUsesNonExemptEncryption: false
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: app.nocturne.Nocturne
        TARGETED_DEVICE_FAMILY: "1,2"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        GENERATE_INFOPLIST_FILE: NO
        SUPPORTS_MACCATALYST: NO
        SUPPORTS_XR_DESIGNED_FOR_IPHONE_IPAD: NO

  NocturneLive:
    type: app-extension
    platform: iOS
    sources:
      - Nocturne/NocturneLive
      - Nocturne/Audio/NowPlayingActivityAttributes.swift
    info:
      path: Nocturne/NocturneLive/Info.plist
      properties:
        CFBundleDisplayName: Nocturne Live
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: app.nocturne.Nocturne.NocturneLive
        GENERATE_INFOPLIST_FILE: NO
        SKIP_INSTALL: YES
        CODE_SIGN_STYLE: Automatic
        INFOPLIST_KEY_NSHumanReadableCopyright: ""

  NocturneTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - NocturneTests
    dependencies:
      - target: Nocturne
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: app.nocturne.NocturneTests
        GENERATE_INFOPLIST_FILE: YES

  NocturneUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - NocturneUITests
    dependencies:
      - target: Nocturne
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: app.nocturne.NocturneUITests
        GENERATE_INFOPLIST_FILE: YES

schemes:
  Nocturne:
    build:
      targets:
        Nocturne: all
        NocturneTests: [test]
        NocturneUITests: [test]
    test:
      targets:
        - NocturneTests
        - NocturneUITests
    run:
      config: Debug
    archive:
      config: Release
