name: SynoMusic
options:
  bundleIdPrefix: app.synomusic
  deploymentTarget:
    iOS: "17.0"
  developmentLanguage: zh-Hans
  xcodeVersion: "26.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "6.0"
    ENABLE_USER_SCRIPT_SANDBOXING: NO
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    MARKETING_VERSION: "1.2.5"
    CURRENT_PROJECT_VERSION: "1"

targets:
  SynoMusic:
    type: application
    platform: iOS
    sources:
      - path: SynoMusic
        excludes:
          - "**/.DS_Store"
          - "SynoMusicLive/**"
    resources:
      - SynoMusic/Resources/Assets.xcassets
    dependencies:
      - target: SynoMusicLive
        embed: true
    info:
      path: SynoMusic/Resources/Info.plist
      properties:
        CFBundleDisplayName: SynoMusic
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        UILaunchScreen:
          UIColorName: BrandBackground
        UIBackgroundModes:
          - audio
        NSSupportsLiveActivities: true
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: true
          NSAllowsLocalNetworking: true
        NSLocalNetworkUsageDescription: SynoMusic 需要访问局域网以连接你的群晖 NAS 上的 Audio Station。
        NSBonjourServices:
          - _http._tcp
          - _https._tcp
        ITSAppUsesNonExemptEncryption: false
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: app.synomusic.SynoMusic
        TARGETED_DEVICE_FAMILY: "1,2"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        GENERATE_INFOPLIST_FILE: NO
        SUPPORTS_MACCATALYST: NO
        SUPPORTS_XR_DESIGNED_FOR_IPHONE_IPAD: NO

  SynoMusicLive:
    type: app-extension
    platform: iOS
    sources:
      - SynoMusic/SynoMusicLive
      - SynoMusic/Audio/NowPlayingActivityAttributes.swift
    info:
      path: SynoMusic/SynoMusicLive/Info.plist
      properties:
        CFBundleDisplayName: SynoMusic Live
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: app.synomusic.SynoMusic.SynoMusicLive
        GENERATE_INFOPLIST_FILE: NO
        SKIP_INSTALL: YES
        CODE_SIGN_STYLE: Automatic
        INFOPLIST_KEY_NSHumanReadableCopyright: ""

  SynoMusicTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - SynoMusicTests
    dependencies:
      - target: SynoMusic
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: app.synomusic.SynoMusicTests
        GENERATE_INFOPLIST_FILE: YES

  SynoMusicUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - SynoMusicUITests
    dependencies:
      - target: SynoMusic
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: app.synomusic.SynoMusicUITests
        GENERATE_INFOPLIST_FILE: YES

schemes:
  SynoMusic:
    build:
      targets:
        SynoMusic: all
        SynoMusicTests: [test]
        SynoMusicUITests: [test]
    test:
      targets:
        - SynoMusicTests
        - SynoMusicUITests
    run:
      config: Debug
    archive:
      config: Release
